name: RhythmForge
options:
  bundleIdPrefix: com.ryankaya
  deploymentTarget:
    iOS: "16.2"
  xcodeVersion: "15.0"
targets:
  RhythmForge:
    type: application
    platform: iOS
    sources:
      - RhythmForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ryankaya.rhythmforge
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: RhythmForge/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: RhythmForge/RhythmForge.entitlements
